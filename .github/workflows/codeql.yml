name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      bootstrapped: ${{ steps.check.outputs.bootstrapped }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: check
        run: |
          if [ -f services/backend/go.sum ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Template not bootstrapped (no go.sum); skipping CodeQL."
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    needs: gate
    if: needs.gate.outputs.bootstrapped == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - uses: github/codeql-action/analyze@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          category: "/language:${{ matrix.language }}"
