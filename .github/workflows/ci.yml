name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Skip CI while the repo is still the unbootstrapped template. Presence of
  # services/backend/go.sum is the signal: the template ships without it; the
  # adopter runs `go mod tidy` after bootstrap and commits the resulting sum.
  # Until then there is nothing meaningful to build, so the real jobs are gated
  # on this check.
  gate:
    runs-on: ubuntu-latest
    outputs:
      bootstrapped: ${{ steps.check.outputs.bootstrapped }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: check
        run: |
          if [ -f services/backend/go.sum ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Template not bootstrapped (no go.sum); skipping CI."
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
          fi

  backend:
    needs: gate
    if: needs.gate.outputs.bootstrapped == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/backend/go.mod
          cache-dependency-path: services/backend/go.sum
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./cmd/main
      - name: test
        run: go test ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend:
    needs: gate
    if: needs.gate.outputs.bootstrapped == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - name: install
        run: npm ci
      - name: lint
        run: npm run lint
      - name: build
        run: npm run build
