# Prod override: built images, no source mounts. Backend is the scratch binary
# (Dockerfile.prod); frontend is the vite build served by nginx, which proxies
# /api to the backend (same origin). Only the frontend is published; the
# backend is reachable only inside the network. Merged on docker-compose.yml.
#
# Reproducibility note: the base compose pins image *minor* tags (postgres:18,
# redis:8, …). For a hardened prod deploy, pin them by digest instead
# (e.g. `image: postgres:18@sha256:<digest>`) so a re-pull cannot drift. Resolve
# digests in your release pipeline (`docker buildx imagetools inspect <ref>`).
services:
  backend:
    build:
      context: ../service/backend
      dockerfile: .docker/Dockerfile.prod
    healthcheck:
      # Scratch image has no shell/curl; the prod build ships a /health binary.
      test: ["CMD", "/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  frontend:
    build:
      context: ../service/frontend
      dockerfile: .docker/Dockerfile.prod
    ports:
      - "${MY_PROJECT_FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  postgresql:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M

  rabbitmq:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  redis:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
