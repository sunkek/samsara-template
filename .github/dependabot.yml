version: 2
updates:
  - package-ecosystem: gomod
    directory: /services/backend
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /services/frontend
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
